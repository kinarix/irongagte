server:
  host: "0.0.0.0"
  port: 8080

database:
  url: "postgres://irongate:irongate@localhost:5433/irongate"
  max_connections: 10

redis:
  url: "redis://localhost:6379"

base_url: "http://localhost:8080"

log:
  level: "info"
  format: "pretty"

tokens:
  access_token_ttl_seconds: 3600
  refresh_token_ttl_seconds: 2592000
  id_token_ttl_seconds: 3600

session:
  ttl_seconds: 86400
  cookie_name: "irongate_session"
  cookie_secure: false

smtp:
  host: "localhost"
  port: 1025
  from: "noreply@localhost"
  username: ""
  password: ""

signing_keys:
  rotation_interval_days: 30
  rotation_grace_days: 7
  ttl_days: 365
  refresh_interval_seconds: 60

rate_limit:
  enabled: true
  global_per_minute: 60
  global_burst: 30
  auth_per_minute: 10
  auth_burst: 3
